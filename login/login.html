<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css">
    
    <!-- daisy and Tailwind Css Link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icon  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    

</head>
<body>
    <section id="login" class="">
        <div class="login_card w-[380px] sm:w-[450px] mt-10  mx-auto border-2 rounded-xl shadow-2xl p-6">
            <div class="card_header flex flex-col justify-center items-center">
                <img src="../assets/github-logo.png" alt="Site Logo image">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-[#64748b] " >Sign in to manage your issues</p>
            </div>
            <div class="card_body">
                <fieldset class="fieldset w-full p-4">
                    <!-- <legend class="fieldset-legend">Login</legend> -->

                    <label class="label">User Name</label>
                    <input id="userName" type="text" class="input w-full" placeholder="Enter Your Name" />
                    <label class="label">Password</label>
                    <input id="password" type="password" class="input w-full" placeholder="Enter Your Password" />
                    <button onclick="handleLogin()" class="btn btn-primary mt-4">Log In</button>
                </fieldset>
            </div>
            <hr class="">
            <div class="card_footer text-center">
                <p class="text-[#64748b] font-extrabold">Demo Credentials:</p>
                <br>
                <div class="demo">
                    <p class="text-[#64748b]"><span class="font-bold">User Name :</span> admin</p>
                    <p class="text-[#64748b]"><span class="font-bold">Password :</span> admin123</p>
                </div>
            </div>

        </div>

    </section>


    <script src="login.js"></script>
</body>
</html>
