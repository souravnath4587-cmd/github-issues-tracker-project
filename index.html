<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- FavIcon Link  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Css Link  -->
     <link rel="stylesheet" href="./style/style.css">
    <!-- daisy and Tailwind Css Link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icon  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Font Link  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">



</head>
<body>
    <header >
        <div class="navbar bg-base-100 shadow-sm flex flex-row justify-between fixed top-0">
            <div class="flex flex-row gap-2">
                <img class="w-[30px]" src="./assets/github-logo.png" alt="Site Logo">
                <a class="text-xl font-bold"><span class="hidden md:block">GitHub Issues Tracker</span><span class="block md:hidden">GIT</span></a>
            </div>
            <div class="flex gap-2">
                <input id="searchIssues" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <button onclick="handleSearch()" type="button" class="btn btn-primary"><span class="block md:hidden">NI</span><span class="md:block hidden"><i class="fa-solid fa-plus"></i> New Issue</span></button>
                <button onclick="logout()" type="button" class="btn btn-secondary"><span class="block md:hidden">LO</span><span class="md:block hidden">Log Out</span></button>
            </div>
        </div>
    </header>
    <main class="container mx-auto pt-20">
        <div id="spinner" class="loading ">
            <span class="loading loading-spinner text-primary"></span>
        </div>
        <section class="tab_section flex flex-row gap-4 justify-start items-center p-4 bg-white rounded-xl shadow-md">
            <button id="all" onclick="selected('all')" class="btn capitalize active"> all</button>
            <button id="open" onclick="selected('open')"  class="btn capitalize"> open</button>
            <button id="close" onclick="selected('closed')"  class="btn capitalize"> close</button>
        </section>
        <section class="my-4 bg-white">
            <div class="section_header flex flex-row justify-between items-center p-4 rounded-t-xl shadow-sm">
                <div class="header_left flex flex-row justify-start items-center gap-2">
                    <div class="image p-2 rounded-full bg-[#ECE4FF]">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div id="header_title">
                        
                    </div>
                </div>
                <div class="header_left">
                    <ul class="list-disc flex flex-row gap-10">
                        <li id="openText" class="font-bold marker:text-green-800 ">Open</li>
                        <li id="closedText" class="font-bold marker:text-blue-800 ">Close</li>
                    </ul>
                </div>
            </div>
            <hr class="border-gray-400">
            <div id="section_body" class="section_body bg-[#fbfbfb] p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            </div>
            
            <dialog id="word_modal" class="modal">
                <div class="modal-box">
                    <div id="detail_container" > 
                    </div>
                        <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn btn-primary">Close</button>
                        </form>
                        </div>
                   
                    
                </div>
            </dialog>

        </section>

    </main>




    <script src="./script/script.js"></script>
</body>
</html>
